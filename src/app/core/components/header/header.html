<header class="topbar">
    <div class="topbar__inner">
      <a class="brand" routerLink="/" aria-label="Inicio">
        <img class="brand__logo" src="logo-the-lake.png" alt="The Lake" />
      </a>

      <nav class="nav" aria-label="Principal">
        @for (item of navItems; track item.label) {
          <a class="nav__link" [href]="item.href">{{ item.label }}</a>
        }
      </nav>

      <div class="topbar__actions" aria-label="Acciones">
        @if (currentUser.user(); as user) {
          <span class="topbar__user" aria-label="Usuario conectado">
            {{ user.name }} {{ user.lastName }}
          </span>
        }
        <button
          class="icon-btn icon-btn--menu"
          type="button"
          aria-label="Abrir menú de categorías"
          (click)="menuToggle.emit()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6.5h16v2H4v-2Zm0 7h16v2H4v-2ZM4 10h16v2H4v-2Z" />
          </svg>
        </button>
        @if (tokenService.isAuthenticated()) {
          <button class="icon-btn" type="button" aria-label="Cerrar sesión" (click)="logout()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.59L17 17l5-5-5-5zM4 5h8V3H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8v-2H4V5z"
              />
            </svg>
          </button>
        } @else {
          <a class="icon-btn" routerLink="/login" aria-label="Iniciar sesión">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Zm0 2.1c-4.03 0-7.35 2.33-7.35 5.25v.53h14.7v-.53c0-2.92-3.32-5.25-7.35-5.25Z"
              />
            </svg>
          </a>
        }
        <a class="icon-btn icon-btn--cart" routerLink="/cart" aria-label="Carrito">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M7 18a2 2 0 1 0 2 2 2 2 0 0 0-2-2Zm10 0a2 2 0 1 0 2 2 2 2 0 0 0-2-2ZM6.2 6H21l-1.7 8.1a2 2 0 0 1-2 1.6H8.1a2 2 0 0 1-2-1.6L4.3 3H2V1h3.9a1 1 0 0 1 1 .8Z"
            />
          </svg>
          @if (cart.count() > 0) {
            <span class="cart-badge" aria-label="Productos en el carrito">{{ cart.count() }}</span>
          }
        </a>
      </div>
    </div>
  </header>
