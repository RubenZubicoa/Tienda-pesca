<header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="#" aria-label="Inicio">
        <img class="brand__logo" src="logo-the-lake.png" alt="The Lake" />
      </a>

      <nav class="nav" aria-label="Principal">
        @for (item of navItems; track item.label) {
          <a class="nav__link" [href]="item.href">{{ item.label }}</a>
        }
      </nav>

      <div class="topbar__actions" aria-label="Acciones">
        <button class="icon-btn" type="button" aria-label="Cuenta">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 12a4.2 4.2 0 1 0-4.2-4.2A4.2 4.2 0 0 0 12 12Zm0 2.1c-4.03 0-7.35 2.33-7.35 5.25v.53h14.7v-.53c0-2.92-3.32-5.25-7.35-5.25Z"
            />
          </svg>
        </button>
        <button class="icon-btn icon-btn--cart" type="button" aria-label="Carrito">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M7 18a2 2 0 1 0 2 2 2 2 0 0 0-2-2Zm10 0a2 2 0 1 0 2 2 2 2 0 0 0-2-2ZM6.2 6H21l-1.7 8.1a2 2 0 0 1-2 1.6H8.1a2 2 0 0 1-2-1.6L4.3 3H2V1h3.9a1 1 0 0 1 1 .8Z"
            />
          </svg>
          <span class="cart-dot" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </header>
