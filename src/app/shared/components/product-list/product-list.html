<section class="panel" id="ofertas" aria-labelledby="ofertas-title">
  <h2 class="panel__title" id="ofertas-title">{{ title() }}</h2>
  @if (description()) {
    <p class="panel__description">{{ description() }}</p>
  }
  <div class="product-grid product-grid--{{ columns() }}">
    @for (p of productCardData(); track p.id + $index) {
    <app-product-card [product]="p"></app-product-card>
    }
  </div>
</section>
