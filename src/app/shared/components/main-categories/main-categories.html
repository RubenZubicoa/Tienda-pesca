<section class="section" aria-labelledby="categorias-title">
    <h2 class="section__title" id="categorias-title">CATEGORÍAS POPULARES</h2>
    <div class="hex-row">
        @for (cat of categories; track cat.label) {
        <a class="hex" [href]="cat.href" [attr.aria-label]="cat.label">
            <span class="hex__frame" aria-hidden="true"></span>
            <span class="hex__content">
                <span class="hex__icon" aria-hidden="true">
                    @switch (cat.icon) {
                    @case ('rod') {
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20.6 3.4 21.9 4.7 8.7 17.9l-1.9-.4-.4-1.9L19.6 2.4Zm-7.7 9.1-2.4-2.4 1.1-1.1 2.4 2.4ZM6 18.5l-.9.9c-.5.5-1.3.5-1.8 0s-.5-1.3 0-1.8l.9-.9.6.6c.3.3.8.3 1.1 0l.7-.7 1.7.4.4 1.7-.7.7c-.3.3-.3.8 0 1.1Z" />
                    </svg>
                    }
                    @case ('reel') {
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M11 3a7 7 0 1 0 7 7h3v2h-3.1a7 7 0 0 1-6.9 5v2h5v2H9v-4.1A7 7 0 0 1 11 3Zm0 2a5 5 0 1 1-5 5 5 5 0 0 1 5-5Zm0 2.2a2.8 2.8 0 1 0 2.8 2.8A2.8 2.8 0 0 0 11 7.2Z" />
                    </svg>
                    }
                    @default {
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M21 8c-3.5 3.6-7.4 6-11.7 7.1l-.6 2.5-2-.5.4-1.7a8.6 8.6 0 0 1-3.1-.8l-1.2.7-1-1.7 1.1-.6A9.7 9.7 0 0 1 3 10l-1-1.7L3.6 7A9.8 9.8 0 0 1 6 6.2l-.4-1.7 2-.5.6 2.5C12.6 7.6 16.5 5.2 21 1v7Z" />
                    </svg>
                    }
                    }
                </span>
                <span class="hex__label">{{ cat.label }}</span>
            </span>
        </a>
        }
    </div>
</section>
